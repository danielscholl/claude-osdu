name: Version Check

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bumps
        run: |
          chmod +x scripts/version.sh
          ./scripts/version.sh check origin/${{ github.base_ref }}
